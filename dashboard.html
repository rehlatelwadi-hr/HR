<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرئيسية | رحلة الوادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Cairo'; display: flex; }
        .sidebar { width: 260px; background: #1e293b; color: white; min-height: 100vh; position: fixed; right:0; top:0; }
        .content { margin-right: 260px; padding: 30px; width: calc(100% - 260px); }
        .nav-link { color: #94a3b8; padding: 12px; margin: 5px 15px; border-radius: 10px; display: block; text-decoration: none; transition: 0.3s; }
        .nav-link.active, .nav-link:hover { background: #3b82f6; color: white; }
        .card { border: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4 border-bottom border-secondary">رحلة الوادي</h4>
        <nav>
            <a href="dashboard.html" class="nav-link active"><i class="fas fa-home me-2"></i> الإحصائيات</a>
            <a href="archive.html" class="nav-link"><i class="fas fa-users-cog me-2"></i> الأرشيف والعمليات</a>
            <a href="payroll.html" class="nav-link"><i class="fas fa-money-check-alt me-2"></i> مسير الرواتب</a>
            <a href="settings.html" class="nav-link"><i class="fas fa-tools me-2"></i> الإعدادات</a>
            <a href="login.html" class="nav-link text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> خروج</a>
        </nav>
    </div>
    <div class="content">
        <h3 class="fw-bold mb-4">نظرة عامة</h3>
        <div class="row g-4 text-center mb-5">
            <div class="col-md-3"><div class="card p-3 shadow-sm border-end border-primary border-4"><h6>الموظفين</h6><h2 id="cE">0</h2></div></div>
            <div class="col-md-3"><div class="card p-3 shadow-sm border-end border-danger border-4"><h6>إجمالي الديون</h6><h2 id="cD">0</h2></div></div>
            <div class="col-md-3"><div class="card p-3 shadow-sm border-end border-warning border-4"><h6>تنبيهات الإقامة</h6><h2 id="cI">0</h2></div></div>
            <div class="col-md-3"><div class="card p-3 shadow-sm border-end border-success border-4"><h6>الفروع</h6><h2 id="cB">0</h2></div></div>
        </div>
        <div class="row g-4">
            <div class="col-md-6"><div class="card p-4 shadow-sm h-100"><h5>⚠️ إقامات تنتهي قريباً (30 يوم)</h5><div id="alertI" class="mt-3"></div></div></div>
            <div class="col-md-6"><div class="card p-4 shadow-sm h-100"><h5>📅 إجازات قادمة (10 أيام)</h5><div id="alertL" class="mt-3"></div></div></div>
        </div>
    </div>
    <script>
        if(!localStorage.getItem('wadi_session')) window.location.href = 'login.html';
        const db = JSON.parse(localStorage.getItem('wadi_db'));
        let debt = 0, alerts = 0, lAlerts = 0, iHtml = "", lHtml = "";
        const now = new Date();
        db.emps.forEach(e => {
            debt += (e.ledger || []).reduce((acc, x) => acc + (x.type === 'd' ? parseFloat(x.amt) : -parseFloat(x.amt)), 0);
            if(e.ie && (new Date(e.ie) - now) / 86400000 < 30) { iHtml += `<div class="alert alert-danger py-2 small">${e.name} - ${e.ie}</div>`; alerts++; }
            if(e.leaves) e.leaves.forEach(lv => {
                let diff = (new Date(lv.s) - now) / 86400000;
                if(diff >= 0 && diff <= 10) { lHtml += `<div class="alert alert-info py-2 small">${e.name} - تبدأ بعد ${Math.ceil(diff)} أيام</div>`; lAlerts++; }
            });
        });
        document.getElementById('cE').innerText = db.emps.length; document.getElementById('cD').innerText = debt;
        document.getElementById('cI').innerText = alerts; document.getElementById('cB').innerText = db.brs.length;
        document.getElementById('alertI').innerHTML = iHtml || "سليم ✅"; document.getElementById('alertL').innerHTML = lHtml || "لا يوجد ✅";
    </script>
</body>
</html>
