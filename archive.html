<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>السجل العام | رحلة الوادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: 'Cairo'; display: flex; }
        .sidebar { width: 260px; background: #0f172a; color: white; min-height: 100vh; position: fixed; right:0; }
        .content { margin-right: 260px; padding: 30px; width: calc(100% - 260px); }
        .nav-link { color: #94a3b8; padding: 12px 20px; border-radius: 10px; margin: 5px 15px; text-decoration: none; display: block; transition: 0.3s; }
        .nav-link.active { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center py-4 border-bottom border-secondary">رحلة الوادي</h4>
        <nav>
            <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line me-2"></i> الإحصائيات</a>
            <a href="archive.html" class="nav-link active"><i class="fas fa-users-cog me-2"></i> الأرشيف والعمليات</a>
            <a href="payroll.html" class="nav-link"><i class="fas fa-money-check-alt me-2"></i> مسير الرواتب</a>
            <a href="settings.html" class="nav-link"><i class="fas fa-tools me-2"></i> الإعدادات</a>
            <a href="login.html" class="nav-link text-danger mt-5"><i class="fas fa-power-off me-2"></i> خروج</a>
        </nav>
    </div>

    <div class="content">
        <div class="d-flex justify-content-between mb-4 align-items-center">
            <h3 class="fw-bold text-dark">سجل الموظفين والملفات</h3>
            <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="window.location.href='add_employee.html'">+ إضافة موظف جديد</button>
        </div>

        <div class="card p-4 mb-4 border-0 shadow-sm rounded-4">
            <div class="row g-2">
                <div class="col-md-3"><select id="fB" class="form-select border-0 bg-light" onchange="render()"></select></div>
                <div class="col-md-7"><input type="text" id="sI" class="form-control border-0 bg-light" placeholder="بحث بالاسم أو الإقامة..." onkeyup="render()"></div>
                <div class="col-md-2"><button class="btn btn-success w-100" onclick="exportEx()"><i class="fas fa-file-excel me-1"></i> Excel</button></div>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden">
            <table class="table table-hover align-middle mb-0" id="empT">
                <thead class="bg-dark text-white">
                    <tr>
                        <th class="py-3 ps-4">اسم الموظف</th>
                        <th>الحالة</th>
                        <th>الرصيد المالي</th>
                        <th class="text-center no-print">خيارات الإدارة</th>
                    </tr>
                </thead>
                <tbody id="body" class="bg-white"></tbody>
            </table>
        </div>
    </div>

    <script>
        const db = JSON.parse(localStorage.getItem('wadi_db')) || { emps: [], brs: ["الرئيسي"] };
        function render() {
            const br = document.getElementById('fB').value, s = document.getElementById('sI').value.toLowerCase();
            document.getElementById('fB').innerHTML = '<option value="all">كل الفروع</option>' + db.brs.map(b => `<option value="${b}">${b}</option>`).join('');
            
            document.getElementById('body').innerHTML = db.emps.map(e => {
                if((br !== 'all' && e.br !== br) || (s && !e.name.toLowerCase().includes(s))) return '';
                let bal = (e.ledger || []).reduce((acc, x) => acc + (x.type === 'd' ? parseFloat(x.amt) : -parseFloat(x.amt)), 0);
                
                return `
                <tr>
                    <td class="ps-4">
                        <div class="fw-bold">${e.name}</div>
                        <small class="text-muted">${e.br} | إقامة: ${e.iq || 'تحت النقل'}</small>
                    </td>
                    <td><span class="badge ${e.sponsorStatus === 'تحت إجراء النقل' ? 'bg-warning text-dark' : 'bg-success'}">${e.sponsorStatus}</span></td>
                    <td class="fw-bold ${bal > 0 ? 'text-danger' : 'text-success'}">${bal} ريال</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-info me-1" onclick="window.location.href='employee_bio.html?uid=${e.uid}'">الملف</button>
                        <button class="btn btn-sm btn-outline-success me-1" onclick="window.location.href='details.html?uid=${e.uid}'">المالية</button>
                        <button class="btn btn-sm btn-outline-warning" onclick="window.location.href='edit_employee.html?uid=${e.uid}'"><i class="fas fa-edit"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }
        function exportEx() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("empT")), "Archive_Wadi.xlsx"); }
        render();
    </script>
</body>
</html>
