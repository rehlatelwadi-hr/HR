<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإعدادات | رحلة الوادي</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 rounded shadow-sm" style="max-width: 900px;">
        <h4 class="mb-4 text-primary border-bottom pb-2">الإعدادات والنسخ الاحتياطي</h4>
        <div class="row g-4">
            <div class="col-md-6 border-start">
                <h6>🏢 إدارة الفروع</h6>
                <div class="input-group mb-3"><input type="text" id="bI" class="form-control" placeholder="اسم الفرع"><button class="btn btn-primary" onclick="addB()">إضافة</button></div>
                <div id="bL" class="d-flex flex-wrap gap-1"></div>
            </div>
            <div class="col-md-6">
                <h6>💾 نسخة احتياطية</h6>
                <p class="small text-muted">قم بتصدير بياناتك كملف خارجي لحمايتها.</p>
                <button class="btn btn-success w-100 mb-2" onclick="ex()">تصدير (JSON)</button>
                <input type="file" class="form-control" onchange="im(this)">
            </div>
        </div>
        <hr class="mt-5"><button class="btn btn-dark w-100" onclick="window.location.href='dashboard.html'">العودة</button>
    </div>
    <script>
        let db = JSON.parse(localStorage.getItem('wadi_db'));
        function addB() { const v = document.getElementById('bI').value; if(v){ db.brs.push(v); localStorage.setItem('wadi_db', JSON.stringify(db)); render(); } }
        function render() { document.getElementById('bL').innerHTML = db.brs.map(b => `<span class="badge bg-secondary p-2">${b}</span>`).join(''); }
        function ex() { const blob = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Wadi_ERP_Backup.json'; a.click(); }
        function im(i) { const r = new FileReader(); r.onload = (e) => { localStorage.setItem('wadi_db', e.target.result); location.reload(); }; r.readAsText(i.files[0]); }
        render();
    </script>
</body>
</html>
